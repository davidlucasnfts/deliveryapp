<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Estabelecimento</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--or:#F97316;--bg:#fff;--bg2:#FFF7ED;--bg3:#FEF3C7;--txt:#1C1917;--txt2:#78716C;--txt3:#A8A29E;--green:#22C55E;--red:#EF4444;--blue:#3B82F6;}
    body{font-family:'Poppins',sans-serif;background:#F9FAFB;min-height:100vh;}

    /* LOADING / AUTH */
    .fullpage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#F9FAFB;flex-direction:column;gap:0.5rem;}
    .fullpage-icon{font-size:2.5rem;}
    .fullpage-txt{font-size:0.85rem;color:var(--txt2);}

    /* HEADER */
    .header{background:#1C1917;padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
    .h-left{display:flex;align-items:center;gap:0.75rem;}
    .h-logo{font-size:0.95rem;font-weight:800;color:var(--or);}
    .h-store{font-size:0.75rem;color:rgba(255,255,255,0.6);}
    .h-right{display:flex;align-items:center;gap:0.75rem;}
    .h-status{display:flex;align-items:center;gap:0.4rem;background:rgba(255,255,255,0.08);border-radius:20px;padding:0.3rem 0.75rem;cursor:pointer;border:none;font-family:'Poppins',sans-serif;font-size:0.75rem;font-weight:600;}
    .h-status.aberta{color:#4ADE80;}
    .h-status.fechada{color:#F87171;}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .dot.green{background:#4ADE80;}
    .dot.red{background:#F87171;}
    .h-logout{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:0.3rem 0.7rem;font-size:0.72rem;color:rgba(255,255,255,0.6);cursor:pointer;font-family:'Poppins',sans-serif;}
    .h-link{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);border-radius:8px;padding:0.3rem 0.7rem;font-size:0.72rem;color:var(--or);cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:none;}

    /* TABS */
    .tabs{display:flex;background:#fff;border-bottom:1px solid #F3F4F6;position:sticky;top:52px;z-index:20;}
    .tab{flex:1;padding:0.75rem;text-align:center;font-size:0.78rem;font-weight:600;color:var(--txt2);cursor:pointer;border-bottom:2.5px solid transparent;transition:all 0.15s;border:none;background:none;font-family:'Poppins',sans-serif;}
    .tab.active{color:var(--or);border-bottom-color:var(--or);}
    .tab-badge{background:var(--red);color:#fff;border-radius:10px;padding:0.1rem 0.45rem;font-size:0.65rem;font-weight:700;margin-left:0.3rem;display:none;}
    .tab-badge.show{display:inline;}

    /* BODY */
    .body{padding:1rem;max-width:800px;margin:0 auto;}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0.65rem;margin-bottom:1rem;}
    .stat{background:#fff;border-radius:12px;padding:0.85rem;border:1px solid #F3F4F6;}
    .stat-val{font-size:1.4rem;font-weight:800;color:var(--or);}
    .stat-lbl{font-size:0.7rem;color:var(--txt2);margin-top:0.1rem;}

    /* NOTIFICAÇÃO */
    .notif{position:fixed;top:70px;right:1rem;background:#1C1917;color:#fff;border-radius:12px;padding:0.75rem 1rem;font-size:0.82rem;font-weight:600;z-index:100;transform:translateX(120%);transition:transform 0.3s;max-width:280px;border-left:3px solid var(--or);}
    .notif.show{transform:translateX(0);}

    /* PEDIDOS */
    .sec-title{font-size:0.75rem;font-weight:700;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:0.65rem;display:flex;align-items:center;gap:0.5rem;}
    .sec-title::after{content:'';flex:1;height:1px;background:#F3F4F6;}
    .empty{text-align:center;padding:3rem 1rem;color:var(--txt3);}
    .empty-icon{font-size:2.5rem;margin-bottom:0.5rem;}
    .empty-txt{font-size:0.85rem;}

    .order-card{background:#fff;border-radius:14px;border:1px solid #F3F4F6;padding:1rem;margin-bottom:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.05);transition:box-shadow 0.15s;}
    .order-card.novo{border-left:3px solid var(--or);}
    .order-card.prep{border-left:3px solid #FACC15;}
    .order-card.saiu{border-left:3px solid var(--blue);}
    .order-card.entregue{border-left:3px solid #D1D5DB;opacity:0.75;}
    .oc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.6rem;gap:0.5rem;}
    .oc-meta{flex:1;}
    .oc-num{font-size:0.68rem;font-weight:600;color:var(--txt3);margin-bottom:0.15rem;}
    .oc-name{font-size:0.95rem;font-weight:700;color:var(--txt);}
    .oc-addr{font-size:0.75rem;color:var(--txt2);margin-top:0.1rem;}
    .oc-tel{font-size:0.75rem;color:var(--txt2);}
    .status-pill{border-radius:20px;padding:0.25rem 0.7rem;font-size:0.7rem;font-weight:700;flex-shrink:0;white-space:nowrap;}
    .s-novo{background:#FFF7ED;color:#C2410C;}
    .s-prep{background:#FEF9C3;color:#854D0E;}
    .s-saiu{background:#DBEAFE;color:#1D4ED8;}
    .s-entregue{background:#F3F4F6;color:#6B7280;}
    .oc-items{font-size:0.78rem;color:var(--txt2);line-height:1.7;margin-bottom:0.6rem;background:#F9FAFB;border-radius:8px;padding:0.5rem 0.75rem;}
    .oc-obs{font-size:0.73rem;color:var(--or);font-style:italic;margin-bottom:0.6rem;background:#FFF7ED;border-radius:8px;padding:0.4rem 0.7rem;}
    .oc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;}
    .oc-total{font-size:1rem;font-weight:800;color:var(--or);}
    .oc-time{font-size:0.7rem;color:var(--txt3);}
    .oc-actions{display:flex;gap:0.4rem;flex-wrap:wrap;}
    .oc-btn{border:none;border-radius:8px;padding:0.38rem 0.75rem;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:opacity 0.15s;}
    .btn-avancar{background:var(--or);color:#fff;}
    .btn-wpp{background:#DCFCE7;color:#15803D;}
    .btn-cancelar{background:#FEE2E2;color:#B91C1C;}

    /* CARDÁPIO */
    .ce-item{display:flex;align-items:center;gap:0.75rem;background:#fff;border-radius:12px;border:1px solid #F3F4F6;padding:0.7rem;margin-bottom:0.6rem;}
    .ce-thumb{width:52px;height:52px;border-radius:9px;background:linear-gradient(135deg,#FEF3C7,#FED7AA);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;}
    .ce-thumb img{width:100%;height:100%;object-fit:cover;border-radius:9px;}
    .ce-info{flex:1;min-width:0;}
    .ce-name{font-size:0.85rem;font-weight:700;color:var(--txt);}
    .ce-cat{font-size:0.72rem;color:var(--txt3);}
    .ce-price{font-size:0.85rem;font-weight:700;color:var(--or);margin-top:0.1rem;}
    .ce-actions{display:flex;align-items:center;gap:0.5rem;}
    .toggle{width:38px;height:22px;background:#E7E5E4;border-radius:20px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;border:none;}
    .toggle.on{background:var(--green);}
    .toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left 0.2s;}
    .toggle.on::after{left:19px;}
    .ce-edit{background:var(--bg3);border:none;border-radius:8px;padding:0.3rem 0.65rem;font-size:0.72rem;font-weight:600;color:#92400E;cursor:pointer;font-family:'Poppins',sans-serif;}

    /* EDIT MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:flex-end;justify-content:center;}
    .modal-bg.open{display:flex;}
    .modal{background:#fff;border-radius:20px 20px 0 0;padding:1.25rem;width:100%;max-width:480px;}
    .modal-title{font-size:0.95rem;font-weight:700;color:var(--txt);margin-bottom:1rem;display:flex;justify-content:space-between;}
    .modal-close{background:none;border:none;font-size:1.2rem;color:var(--txt2);cursor:pointer;}
    .m-label{font-size:0.73rem;font-weight:600;color:var(--txt2);margin-bottom:0.25rem;display:block;}
    .m-input{width:100%;border:1.5px solid #E7E5E4;border-radius:9px;padding:0.5rem 0.75rem;font-family:'Poppins',sans-serif;font-size:0.85rem;margin-bottom:0.75rem;}
    .m-input:focus{outline:none;border-color:var(--or);}
    .m-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
    .m-save{width:100%;background:var(--or);color:#fff;border:none;border-radius:10px;padding:0.72rem;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}

    /* CONFIG */
    .cfg-card{background:#fff;border-radius:12px;padding:1rem;margin-bottom:0.75rem;border:1px solid #F3F4F6;}
    .cfg-title{font-size:0.82rem;font-weight:700;color:var(--txt);margin-bottom:0.75rem;}
    .cfg-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.65rem;}
    .cfg-lbl{font-size:0.8rem;color:var(--txt);}
    .cfg-inp{width:100%;border:1.5px solid #E7E5E4;border-radius:9px;padding:0.5rem 0.75rem;font-family:'Poppins',sans-serif;font-size:0.83rem;margin-bottom:0.65rem;}
    .cfg-inp:focus{outline:none;border-color:var(--or);}
    .cfg-save{background:var(--or);color:#fff;border:none;border-radius:9px;padding:0.5rem 1.1rem;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;}
    .link-box{background:#F9FAFB;border:1px solid #F3F4F6;border-radius:9px;padding:0.6rem 0.85rem;font-size:0.78rem;color:var(--txt2);word-break:break-all;margin-bottom:0.65rem;font-family:'Courier New',monospace;}
    .copy-link{background:var(--bg3);border:none;border-radius:8px;padding:0.4rem 0.85rem;font-size:0.78rem;font-weight:600;color:#92400E;cursor:pointer;font-family:'Poppins',sans-serif;}
  </style>
</head>
<body>

  <div class="fullpage" id="loading">
    <div class="fullpage-icon">🍕</div>
    <div class="fullpage-txt">Carregando painel...</div>
  </div>

  <div id="appRoot" style="display:none;">
    <div class="header">
      <div class="h-left">
        <div>
          <div class="h-logo">DeliveryApp</div>
          <div class="h-store" id="hStoreName">—</div>
        </div>
      </div>
      <div class="h-right">
        <button class="h-status aberta" id="btnStatus" onclick="toggleLoja()">
          <span class="dot green" id="dotStatus"></span>
          <span id="statusTxt">Aberta</span>
        </button>
        <a class="h-link" id="linkCardapio" href="#" target="_blank">Ver cardápio</a>
        <button class="h-logout" onclick="sair()">Sair</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="trocarTab('pedidos',this)">
        Pedidos <span class="tab-badge" id="badgeNovos">0</span>
      </button>
      <button class="tab" onclick="trocarTab('cardapio',this)">Cardápio</button>
      <button class="tab" onclick="trocarTab('config',this)">Configurações</button>
    </div>

    <div class="body" id="mainBody"></div>
  </div>

  <!-- NOTIFICAÇÃO -->
  <div class="notif" id="notif">🛎️ Novo pedido chegou!</div>

  <!-- MODAL EDITAR PRODUTO -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-title">
        Editar produto
        <button class="modal-close" onclick="fecharModal()">×</button>
      </div>
      <label class="m-label">Nome</label>
      <input class="m-input" id="epNome">
      <label class="m-label">Descrição</label>
      <input class="m-input" id="epDesc">
      <div class="m-row">
        <div>
          <label class="m-label">Preço (R$)</label>
          <input class="m-input" id="epPreco" type="number" step="0.01">
        </div>
        <div>
          <label class="m-label">URL da foto</label>
          <input class="m-input" id="epFoto" placeholder="https://...">
        </div>
      </div>
      <button class="m-save" onclick="salvarProduto()">Salvar alterações</button>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js'
    import { escutarPedidos, atualizarStatus } from './js/pedidos.js'

    let loja       = null
    let produtos   = []
    let categorias = []
    let pedidos    = []
    let tabAtual   = 'pedidos'
    let editandoId = null
    let canal      = null

    const statusLabel = { novo:'Novo', prep:'Em preparo', saiu:'Saiu p/ entrega', entregue:'Entregue' }
    const statusNext  = { novo:'prep', prep:'saiu', saiu:'entregue' }
    const statusNextLabel = { novo:'Iniciar preparo', prep:'Saiu p/ entrega', saiu:'Marcar entregue' }
    const fmt = v => 'R$' + Number(v).toFixed(2).replace('.', ',')

    function horaFormatada(ts) {
      return new Date(ts).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
    }

    async function init() {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) { window.location.href = 'login.html'; return }

      const { data: perfil } = await supabase
        .from('usuarios').select('*, lojas(*)').eq('email', user.email).single()

      if (!perfil) { window.location.href = 'login.html'; return }

      loja = perfil.lojas
      document.getElementById('hStoreName').textContent = loja.nome
      document.getElementById('linkCardapio').href = `index.html?loja=${loja.id}`
      atualizarBotaoStatus()

      await carregarDados()
      iniciarRealtime()

      document.getElementById('loading').style.display  = 'none'
      document.getElementById('appRoot').style.display  = 'block'
      renderPedidos()
    }

    async function carregarDados() {
      const [{ data: p }, { data: c }, { data: pd }] = await Promise.all([
        supabase.from('produtos').select('*, categorias(nome)').eq('loja_id', loja.id).order('ordem'),
        supabase.from('categorias').select('*').eq('loja_id', loja.id).eq('ativa', true).order('ordem'),
        supabase.from('pedidos').select('*, itens_pedido(*)').eq('loja_id', loja.id)
          .order('criado_em', { ascending: false }).limit(50)
      ])
      produtos   = p || []
      categorias = c || []
      pedidos    = pd || []
    }

    function iniciarRealtime() {
      canal = escutarPedidos(loja.id, async payload => {
        // Busca o pedido completo com itens
        const { data } = await supabase
          .from('pedidos').select('*, itens_pedido(*)')
          .eq('id', payload.new.id).single()
        if (data) {
          pedidos.unshift(data)
          if (tabAtual === 'pedidos') renderPedidos()
          mostrarNotificacao()
        }
      })
    }

    function mostrarNotificacao() {
      const n = document.getElementById('notif')
      n.classList.add('show')
      setTimeout(() => n.classList.remove('show'), 4000)
      // Som de notificação
      try {
        const ctx = new AudioContext()
        const osc = ctx.createOscillator()
        const gain = ctx.createGain()
        osc.connect(gain); gain.connect(ctx.destination)
        osc.frequency.value = 880; gain.gain.value = 0.3
        osc.start(); osc.stop(ctx.currentTime + 0.15)
      } catch(e) {}
    }

    function atualizarBotaoStatus() {
      const btn  = document.getElementById('btnStatus')
      const dot  = document.getElementById('dotStatus')
      const txt  = document.getElementById('statusTxt')
      if (loja.aberta) {
        btn.className = 'h-status aberta'
        dot.className = 'dot green'
        txt.textContent = 'Aberta'
      } else {
        btn.className = 'h-status fechada'
        dot.className = 'dot red'
        txt.textContent = 'Fechada'
      }
    }

    window.toggleLoja = async function() {
      loja.aberta = !loja.aberta
      await supabase.from('lojas').update({ aberta: loja.aberta }).eq('id', loja.id)
      atualizarBotaoStatus()
    }

    window.sair = async function() {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    }

    window.trocarTab = function(tab, el) {
      tabAtual = tab
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      if (tab === 'pedidos') renderPedidos()
      else if (tab === 'cardapio') renderCardapio()
      else renderConfig()
    }

    // ===== PEDIDOS =====
    function renderPedidos() {
      const ativos    = pedidos.filter(p => p.status !== 'entregue')
      const entregues = pedidos.filter(p => p.status === 'entregue')
      const totalHoje = pedidos.reduce((s, p) => s + Number(p.total || 0), 0)
      const badge     = document.getElementById('badgeNovos')
      const novos     = pedidos.filter(p => p.status === 'novo').length
      badge.textContent = novos
      badge.className   = novos > 0 ? 'tab-badge show' : 'tab-badge'

      let html = `
        <div class="stats">
          <div class="stat"><div class="stat-val">${pedidos.length}</div><div class="stat-lbl">Pedidos hoje</div></div>
          <div class="stat"><div class="stat-val">${ativos.length}</div><div class="stat-lbl">Em aberto</div></div>
          <div class="stat"><div class="stat-val">${fmt(totalHoje)}</div><div class="stat-lbl">Faturamento</div></div>
        </div>`

      if (ativos.length) {
        html += `<div class="sec-title">Em andamento</div>`
        ativos.forEach(p => { html += cardPedido(p) })
      }
      if (entregues.length) {
        html += `<div class="sec-title">Entregues</div>`
        entregues.forEach(p => { html += cardPedido(p) })
      }
      if (!pedidos.length) {
        html += `<div class="empty"><div class="empty-icon">📭</div><div class="empty-txt">Nenhum pedido ainda hoje.<br>Quando chegarem aparecem aqui automaticamente.</div></div>`
      }
      document.getElementById('mainBody').innerHTML = html
    }

    function cardPedido(p) {
      const itens = (p.itens_pedido || []).map(i => `${i.quantidade}x ${i.nome_produto}`).join(' · ')
      const prox  = statusNext[p.status]
      return `
        <div class="order-card ${p.status}" id="card-${p.id}">
          <div class="oc-top">
            <div class="oc-meta">
              <div class="oc-num">#${p.numero || p.id.slice(0,6).toUpperCase()} · ${horaFormatada(p.criado_em)}</div>
              <div class="oc-name">${p.nome_cliente}</div>
              <div class="oc-addr">📍 ${p.endereco_entrega || '—'}</div>
              ${p.telefone_cliente ? `<div class="oc-tel">📱 ${p.telefone_cliente}</div>` : ''}
            </div>
            <span class="status-pill s-${p.status}">${statusLabel[p.status]}</span>
          </div>
          <div class="oc-items">${itens || '—'}</div>
          ${p.observacoes ? `<div class="oc-obs">📝 ${p.observacoes}</div>` : ''}
          <div class="oc-footer">
            <div>
              <div class="oc-total">${fmt(p.total)}</div>
            </div>
            <div class="oc-actions">
              ${p.telefone_cliente ? `<button class="oc-btn btn-wpp" onclick="chamarWpp('${p.telefone_cliente}','${p.nome_cliente}')">WhatsApp</button>` : ''}
              ${prox ? `<button class="oc-btn btn-avancar" onclick="avancar('${p.id}','${prox}')">→ ${statusNextLabel[p.status]}</button>` : ''}
            </div>
          </div>
        </div>`
    }

    window.avancar = async function(id, novoStatus) {
      await atualizarStatus(id, novoStatus)
      const p = pedidos.find(x => x.id === id)
      if (p) p.status = novoStatus
      renderPedidos()
    }

    window.chamarWpp = function(tel, nome) {
      const num = tel.replace(/\D/g, '')
      window.open(`https://wa.me/55${num}?text=${encodeURIComponent(`Olá ${nome}, tudo bem com seu pedido?`)}`, '_blank')
    }

    // ===== CARDÁPIO =====
    function renderCardapio() {
      let html = ''
      categorias.forEach(cat => {
        const itens = produtos.filter(p => p.categoria_id === cat.id)
        html += `<div class="sec-title">${cat.nome}</div>`
        itens.forEach(p => {
          html += `
            <div class="ce-item">
              <div class="ce-thumb">${p.foto_url ? `<img src="${p.foto_url}" alt="">` : '🍽️'}</div>
              <div class="ce-info">
                <div class="ce-name">${p.nome}</div>
                <div class="ce-cat">${p.categorias?.nome || ''}</div>
                <div class="ce-price">R$${Number(p.preco).toFixed(2).replace('.',',')}</div>
              </div>
              <div class="ce-actions">
                <button class="toggle ${p.disponivel ? 'on' : ''}" onclick="toggleProduto('${p.id}')"></button>
                <button class="ce-edit" onclick="abrirModal('${p.id}')">Editar</button>
              </div>
            </div>`
        })
      })
      if (!html) html = '<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-txt">Nenhum produto cadastrado ainda.</div></div>'
      document.getElementById('mainBody').innerHTML = html
    }

    window.toggleProduto = async function(id) {
      const p = produtos.find(x => x.id === id)
      p.disponivel = !p.disponivel
      await supabase.from('produtos').update({ disponivel: p.disponivel }).eq('id', id)
      renderCardapio()
    }

    window.abrirModal = function(id) {
      editandoId = id
      const p = produtos.find(x => x.id === id)
      document.getElementById('epNome').value  = p.nome
      document.getElementById('epDesc').value  = p.descricao || ''
      document.getElementById('epPreco').value = p.preco
      document.getElementById('epFoto').value  = p.foto_url || ''
      document.getElementById('modalBg').classList.add('open')
    }

    window.fecharModal = function() {
      document.getElementById('modalBg').classList.remove('open')
    }

    window.salvarProduto = async function() {
      const updates = {
        nome:      document.getElementById('epNome').value,
        descricao: document.getElementById('epDesc').value,
        preco:     parseFloat(document.getElementById('epPreco').value),
        foto_url:  document.getElementById('epFoto').value || null
      }
      await supabase.from('produtos').update(updates).eq('id', editandoId)
      const p = produtos.find(x => x.id === editandoId)
      Object.assign(p, updates)
      fecharModal()
      renderCardapio()
    }

    // ===== CONFIG =====
    function renderConfig() {
      const link = `${window.location.origin}/index.html?loja=${loja.id}`
      document.getElementById('mainBody').innerHTML = `
        <div class="cfg-card">
          <div class="cfg-title">Link do cardápio digital</div>
          <div class="link-box" id="linkBox">${link}</div>
          <button class="copy-link" onclick="copiarLink()">📋 Copiar link</button>
          <p style="font-size:0.73rem;color:var(--txt3);margin-top:0.5rem;">Compartilhe este link com seus clientes pelo WhatsApp ou Instagram.</p>
        </div>
        <div class="cfg-card">
          <div class="cfg-title">Informações da loja</div>
          <label class="m-label" style="font-size:0.73rem;font-weight:600;color:var(--txt2);margin-bottom:0.25rem;display:block;">Nome</label>
          <input class="cfg-inp" id="cfgNome" value="${loja.nome || ''}">
          <label class="m-label" style="font-size:0.73rem;font-weight:600;color:var(--txt2);margin-bottom:0.25rem;display:block;">Descrição</label>
          <input class="cfg-inp" id="cfgDesc" value="${loja.descricao || ''}">
          <label class="m-label" style="font-size:0.73rem;font-weight:600;color:var(--txt2);margin-bottom:0.25rem;display:block;">Tempo de entrega</label>
          <input class="cfg-inp" id="cfgTempo" value="${loja.tempo_entrega || ''}">
          <label class="m-label" style="font-size:0.73rem;font-weight:600;color:var(--txt2);margin-bottom:0.25rem;display:block;">WhatsApp (com DDD)</label>
          <input class="cfg-inp" id="cfgWpp" value="${loja.whatsapp || ''}" type="tel">
          <button class="cfg-save" onclick="salvarConfig()">Salvar informações</button>
        </div>
        <div class="cfg-card">
          <div class="cfg-title">Status da loja</div>
          <div class="cfg-row">
            <span class="cfg-lbl">Loja aberta para pedidos</span>
            <button class="toggle ${loja.aberta ? 'on' : ''}" id="toggleAberta" onclick="toggleLoja()"></button>
          </div>
        </div>`
    }

    window.copiarLink = function() {
      const link = document.getElementById('linkBox').textContent
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.querySelector('.copy-link')
        btn.textContent = '✅ Copiado!'
        setTimeout(() => btn.textContent = '📋 Copiar link', 2000)
      })
    }

    window.salvarConfig = async function() {
      const updates = {
        nome:          document.getElementById('cfgNome').value,
        descricao:     document.getElementById('cfgDesc').value,
        tempo_entrega: document.getElementById('cfgTempo').value,
        whatsapp:      document.getElementById('cfgWpp').value
      }
      await supabase.from('lojas').update(updates).eq('id', loja.id)
      Object.assign(loja, updates)
      document.getElementById('hStoreName').textContent = loja.nome
      alert('Configurações salvas com sucesso!')
    }

    init()
  </script>
</body>
</html>
