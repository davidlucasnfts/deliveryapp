<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeliveryApp — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFF7ED,#FEF3C7);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .card{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.10);}
    .logo{text-align:center;margin-bottom:1.5rem;}
    .logo-icon{font-size:2.5rem;}
    .logo-name{font-size:1.5rem;font-weight:800;color:#F97316;display:block;margin-top:0.25rem;}
    .logo-sub{font-size:0.78rem;color:#78716C;letter-spacing:1px;text-transform:uppercase;}
    .badge{display:inline-block;background:#FEF3C7;color:#92400E;border-radius:20px;padding:0.25rem 0.85rem;font-size:0.72rem;font-weight:700;margin-bottom:1.25rem;}
    .tab-row{display:flex;background:#F9FAFB;border-radius:10px;padding:0.25rem;margin-bottom:1.25rem;gap:0.25rem;}
    .tab{flex:1;padding:0.5rem;text-align:center;font-size:0.8rem;font-weight:600;border-radius:8px;cursor:pointer;border:none;background:transparent;color:#78716C;font-family:'Poppins',sans-serif;transition:all 0.15s;}
    .tab.active{background:#fff;color:#F97316;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
    label{font-size:0.75rem;font-weight:600;color:#78716C;display:block;margin-bottom:0.25rem;}
    input{width:100%;border:1.5px solid #E7E5E4;border-radius:9px;padding:0.6rem 0.75rem;font-family:'Poppins',sans-serif;font-size:0.88rem;color:#1C1917;margin-bottom:1rem;}
    input:focus{outline:none;border-color:#F97316;}
    .btn{width:100%;background:#F97316;color:#fff;border:none;border-radius:10px;padding:0.8rem;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:background 0.15s;}
    .btn:hover{background:#EA6C0A;}
    .btn:disabled{background:#FED7AA;cursor:not-allowed;}
    .error{font-size:0.78rem;color:#EF4444;margin-bottom:0.75rem;display:none;background:#FEF2F2;border-radius:8px;padding:0.5rem 0.75rem;}
    .hint{font-size:0.72rem;color:#A8A29E;text-align:center;margin-top:0.85rem;}
    .divider{border:none;border-top:1px solid #F3F4F6;margin:1.25rem 0;}
    .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🍕</span>
      <span class="logo-name">DeliveryApp</span>
      <span class="logo-sub">Gestão de delivery</span>
    </div>

    <div style="text-align:center">
      <span class="badge" id="badgeText">Acesso do estabelecimento</span>
    </div>

    <div class="tab-row">
      <button class="tab active" onclick="setTipo('dono')">Sou dono de loja</button>
      <button class="tab" onclick="setTipo('admin')">Admin</button>
    </div>

    <div class="error" id="errorMsg"></div>

    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">

    <button class="btn" id="btnLogin" onclick="fazerLogin()">
      <span id="btnText">Entrar</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="hint" id="hintText">Acesso exclusivo para donos de estabelecimento</div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    let tipoUsuario = 'dono'

    window.setTipo = function(tipo) {
      tipoUsuario = tipo
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      event.target.classList.add('active')
      const badge = document.getElementById('badgeText')
      const hint  = document.getElementById('hintText')
      if (tipo === 'admin') {
        badge.textContent = 'Acesso administrativo'
        hint.textContent  = 'Acesso restrito — somente administradores'
      } else {
        badge.textContent = 'Acesso do estabelecimento'
        hint.textContent  = 'Acesso exclusivo para donos de estabelecimento'
      }
    }

    window.fazerLogin = async function() {
      const email = document.getElementById('email').value.trim()
      const senha = document.getElementById('senha').value
      const err   = document.getElementById('errorMsg')
      const btn   = document.getElementById('btnLogin')
      const txt   = document.getElementById('btnText')
      const spin  = document.getElementById('spinner')

      if (!email || !senha) {
        err.textContent = 'Preencha e-mail e senha.'
        err.style.display = 'block'
        return
      }

      err.style.display = 'none'
      btn.disabled = true
      txt.style.display = 'none'
      spin.style.display = 'block'

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email, password: senha
        })

        if (error) throw error

        // Busca perfil do usuário
        const { data: perfil } = await supabase
          .from('usuarios')
          .select('perfil')
          .eq('email', email)
          .single()

        if (perfil?.perfil === 'admin') {
          window.location.href = 'admin.html'
        } else {
          window.location.href = 'painel.html'
        }

      } catch (e) {
        err.textContent = 'E-mail ou senha incorretos. Tente novamente.'
        err.style.display = 'block'
        btn.disabled = false
        txt.style.display = 'block'
        spin.style.display = 'none'
      }
    }

    // Permitir Enter para logar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.fazerLogin()
    })

    // Verificar se já está logado
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'painel.html'
    })
  </script>
</body>
</html>
