<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --pr:#BC3000;--pr2:#FF7852;--pr3:#FF5624;
      --bg:#FFFCF7;--bg2:#F6F3EE;--bg3:#F0EEE8;--bg4:#EAE8E2;
      --txt:#383835;--txt2:#656461;--txt3:#82807C;
      --grn:#22C55E;--red:#EF4444;
      --surf:#FFFFFF;
      --shadow:0 4px 24px rgba(56,56,53,0.10);
      --shadow-lg:0 8px 40px rgba(56,56,53,0.15);
    }
    html{scroll-behavior:smooth;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden;}

    .mi{font-family:'Material Symbols Outlined';font-size:22px;user-select:none;line-height:1;}

    /* LOADING */
    .loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
    .loading-logo{font-size:1.8rem;font-weight:900;color:var(--pr);letter-spacing:-1px;margin-bottom:0.5rem;}
    .loading-sub{font-size:0.78rem;color:var(--txt3);font-weight:500;}
    .loading-dots{display:flex;gap:6px;margin-top:1.5rem;}
    .loading-dot{width:8px;height:8px;border-radius:50%;background:var(--pr);animation:dotpulse 1.2s ease-in-out infinite;}
    .loading-dot:nth-child(2){animation-delay:0.2s;}
    .loading-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes dotpulse{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}

    .inativa{text-align:center;padding:4rem 2rem;}
    .inativa-icon{font-size:3rem;margin-bottom:1rem;}
    .inativa-txt{font-size:1rem;font-weight:700;color:var(--txt);margin-bottom:0.5rem;}
    .inativa-sub{font-size:0.82rem;color:var(--txt2);}

    /* HEADER */
    .header{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,252,247,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;z-index:50;border-bottom:1px solid rgba(56,56,53,0.06);}
    .header-logo{font-size:1.3rem;font-weight:900;color:var(--pr);letter-spacing:-0.5px;}
    .header-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;}
    .header-btn:active{background:var(--bg4);}

    /* HERO */
    .hero{margin-top:68px;position:relative;}
    .hero-img-wrap{position:relative;margin:1rem 1.25rem 0;border-radius:24px;overflow:hidden;height:280px;box-shadow:var(--shadow-lg);}
    .hero-img{width:100%;height:100%;object-fit:cover;display:block;}
    .hero-img-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#FEF3C7 0%,#FED7AA 50%,#FCA5A5 100%);display:flex;align-items:center;justify-content:center;font-size:5rem;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.1) 60%,transparent 100%);}
    .hero-content{position:absolute;bottom:0;left:0;right:0;padding:1.5rem;}
    .hero-name{font-size:1.6rem;font-weight:900;color:#fff;letter-spacing:-0.5px;line-height:1.1;margin-bottom:0.35rem;}
    .hero-desc{font-size:0.82rem;color:rgba(255,255,255,0.85);margin-bottom:0.85rem;font-weight:500;}
    .hero-badges{display:flex;gap:0.5rem;flex-wrap:wrap;}
    .hero-badge{padding:0.3rem 0.85rem;border-radius:99px;font-size:0.7rem;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:0.35rem;}
    .badge-open{background:var(--pr);color:#fff;}
    .badge-glass{background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,0.25);}
    .pulse{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(1.3);}}

    /* CATEGORIES */
    .cats-wrap{padding:1.25rem 0 0.5rem;}
    .cats{display:flex;gap:0.6rem;padding:0 1.25rem;overflow-x:auto;scrollbar-width:none;}
    .cats::-webkit-scrollbar{display:none;}
    .cat-btn{flex-shrink:0;padding:0.6rem 1.35rem;border-radius:12px;font-size:0.82rem;font-weight:700;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.18s;white-space:nowrap;}
    .cat-btn.active{background:var(--pr);color:#fff;box-shadow:0 4px 16px rgba(188,48,0,0.3);}
    .cat-btn:not(.active){background:var(--bg3);color:var(--txt2);}
    .cat-btn:not(.active):active{background:var(--bg4);}

    /* MENU */
    /* BUG FIX: padding-bottom aumentado para não ficar atrás da cart-bar */
    .menu-body{padding:0.75rem 1.25rem 7rem;}
    .sec-hd{font-size:0.72rem;font-weight:800;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;padding:1.25rem 0 0.75rem;}

    /* ITEM CARD */
    .item-card{position:relative;background:var(--surf);border-radius:20px;padding:1.1rem;margin-bottom:1rem;box-shadow:var(--shadow);overflow:visible;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
    .item-card:active{transform:scale(0.98);box-shadow:0 2px 12px rgba(56,56,53,0.08);}
    .item-card.indisponivel{opacity:0.5;cursor:not-allowed;}
    .item-float-img{position:absolute;top:-18px;right:-6px;width:110px;height:110px;border-radius:50%;object-fit:cover;box-shadow:0 8px 24px rgba(0,0,0,0.18);transition:transform 0.4s;pointer-events:none;z-index:2;}
    .item-float-ph{position:absolute;top:-18px;right:-6px;width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#FEF3C7,#FED7AA);display:flex;align-items:center;justify-content:center;font-size:2.8rem;box-shadow:0 8px 24px rgba(0,0,0,0.12);pointer-events:none;z-index:2;}
    .item-card:hover .item-float-img,.item-card:hover .item-float-ph{transform:scale(1.08) rotate(6deg);}
    .item-body{padding-right:90px;}
    .iname{font-size:1rem;font-weight:800;color:var(--txt);margin-bottom:0.3rem;line-height:1.2;}
    .idesc{font-size:0.76rem;color:var(--txt2);line-height:1.5;margin-bottom:0.75rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .ifoot{display:flex;align-items:center;justify-content:space-between;}
    .iprice{font-size:1.15rem;font-weight:900;color:var(--pr);}
    .iadd-float{position:absolute;bottom:1rem;right:1rem;width:44px;height:44px;border-radius:50%;background:var(--pr);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(188,48,0,0.35);transition:transform 0.15s,box-shadow 0.15s;z-index:3;}
    .iadd-float:active{transform:scale(0.9);}
    .tag-indisponivel{font-size:0.68rem;background:var(--bg3);color:var(--txt3);border-radius:99px;padding:0.2rem 0.65rem;font-weight:700;}

    /* TOAST */
    .toast-add{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--txt);color:#fff;border-radius:99px;padding:0.6rem 1.25rem;font-size:0.8rem;font-weight:700;z-index:200;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;display:flex;align-items:center;gap:0.5rem;}
    .toast-add.show{transform:translateX(-50%) translateY(0);}

    /* ITEM MODAL */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
    .overlay.open{display:flex;}
    .modal-box{background:var(--bg);border-radius:28px 28px 0 0;width:100%;max-width:480px;overflow:hidden;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .im-img-wrap{position:relative;}
    .im-img{width:100%;height:220px;object-fit:cover;display:block;}
    .im-img-placeholder{width:100%;height:220px;background:linear-gradient(135deg,#FEF3C7,#FED7AA);display:flex;align-items:center;justify-content:center;font-size:5rem;}
    .im-close{position:absolute;top:0.75rem;right:0.75rem;background:rgba(255,255,255,0.92);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
    .im-body{padding:1.25rem 1.25rem 1.5rem;}
    .im-name{font-size:1.2rem;font-weight:900;color:var(--txt);margin-bottom:0.3rem;letter-spacing:-0.3px;}
    .im-desc{font-size:0.82rem;color:var(--txt2);margin-bottom:1rem;line-height:1.6;}
    .im-row{display:flex;align-items:center;justify-content:space-between;}
    .im-price{font-size:1.4rem;font-weight:900;color:var(--pr);}

    /* BUG FIX: qrow agora tem botão − E + */
    .qrow{display:flex;align-items:center;gap:0.5rem;background:var(--bg3);border-radius:99px;padding:0.3rem;}
    .qbtn{width:34px;height:34px;border-radius:50%;border:none;background:var(--pr);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;}
    .qbtn:active{transform:scale(0.88);}
    .qbtn.minus{background:var(--bg4);color:var(--txt);}
    .qbtn.minus:active{background:var(--bg3);}
    .qnum{font-size:1rem;font-weight:800;min-width:28px;text-align:center;color:var(--txt);padding:0 0.25rem;}
    .im-add{width:100%;background:var(--pr);color:#fff;border:none;border-radius:16px;padding:0.9rem;font-size:0.95rem;font-weight:800;cursor:pointer;margin-top:1rem;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 16px rgba(188,48,0,0.3);transition:transform 0.15s;}
    .im-add:active{transform:scale(0.98);}

    /* CART BAR — FIX: largura completa, sempre visível, sem corte */
    .cart-bar{
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:480px;
      z-index:40;
      display:none;
      padding:0.75rem 1rem 1.25rem;
      background:rgba(255,252,247,0.95);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-top:1px solid rgba(56,56,53,0.08);
    }
    .cart-bar.show{display:block;}
    .cart-bar-inner{
      background:var(--pr);
      border-radius:16px;
      padding:0.9rem 1rem;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 4px 20px rgba(188,48,0,0.35);
    }
    .cb-left{display:flex;flex-direction:column;}
    .cb-cnt{font-size:0.7rem;color:rgba(255,255,255,0.75);font-weight:600;letter-spacing:0.5px;}
    .cb-tot{font-size:1.1rem;font-weight:900;color:#fff;line-height:1.2;}
    .cb-btn{background:#fff;color:var(--pr);border:none;border-radius:12px;padding:0.65rem 1.25rem;font-size:0.88rem;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:0.5rem;white-space:nowrap;transition:transform 0.15s;}
    .cb-btn:active{transform:scale(0.96);}

    /* TELA CARRINHO */
    .cart-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:60;flex-direction:column;max-width:480px;margin:0 auto;}
    .cart-screen.open{display:flex;}
    .cs-header{background:var(--bg);padding:1.1rem 1.25rem;display:flex;align-items:center;gap:0.85rem;border-bottom:1px solid rgba(56,56,53,0.06);flex-shrink:0;}
    .cs-back{background:var(--bg3);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
    .cs-title{font-size:1rem;font-weight:900;color:var(--txt);}
    .cs-body{flex:1;overflow-y:auto;padding:0 1.25rem;}
    .cs-item{display:flex;align-items:center;gap:0.85rem;padding:0.9rem 0;border-bottom:1px solid rgba(56,56,53,0.06);}
    .csi-img{width:56px;height:56px;border-radius:14px;object-fit:cover;flex-shrink:0;}
    .csi-img-ph{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#FEF3C7,#FED7AA);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
    .csi-info{flex:1;min-width:0;}
    .csi-name{font-size:0.88rem;font-weight:800;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .csi-price{font-size:0.78rem;color:var(--txt3);font-weight:600;margin-top:0.1rem;}
    .csi-controls{display:flex;align-items:center;gap:0.4rem;background:var(--bg3);border-radius:99px;padding:0.25rem;}
    .csi-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--txt2);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .csi-btn:active{background:var(--bg4);}
    .csi-btn.remove{color:var(--red);}
    .csi-qty{font-size:0.85rem;font-weight:800;min-width:18px;text-align:center;color:var(--txt);}
    .csi-subtotal{font-size:0.88rem;font-weight:800;color:var(--pr);min-width:60px;text-align:right;flex-shrink:0;}
    .cs-total{padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;border-top:2px solid rgba(56,56,53,0.06);flex-shrink:0;}
    .cs-total-lbl{font-size:0.82rem;font-weight:700;color:var(--txt2);}
    .cs-total-val{font-size:1.2rem;font-weight:900;color:var(--txt);}

    /* FORM */
    .cs-form{padding:0.5rem 1.25rem 1.5rem;flex-shrink:0;}
    .cs-section{font-size:0.68rem;font-weight:800;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin:1rem 0 0.65rem;display:flex;align-items:center;gap:0.5rem;}
    .cs-section::after{content:'';flex:1;height:1px;background:rgba(56,56,53,0.08);}
    .cs-label{font-size:0.75rem;font-weight:700;color:var(--txt2);margin-bottom:0.3rem;display:block;}
    .cs-input{width:100%;border:1.5px solid rgba(56,56,53,0.12);border-radius:14px;padding:0.65rem 0.9rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;color:var(--txt);background:var(--surf);transition:border-color 0.15s;margin-bottom:0.65rem;}
    .cs-input:focus{outline:none;border-color:var(--pr);}
    .cs-input:disabled{background:var(--bg3);color:var(--txt3);}
    .cs-input.valido{border-color:var(--grn);}
    .cs-input.invalido{border-color:var(--red);}
    .cs-row{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
    .cs-textarea{width:100%;border:1.5px solid rgba(56,56,53,0.12);border-radius:14px;padding:0.65rem 0.9rem;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.85rem;color:var(--txt);height:70px;resize:none;margin-bottom:0.65rem;background:var(--surf);}
    .cs-textarea:focus{outline:none;border-color:var(--pr);}
    .cep-row{display:flex;gap:0.5rem;align-items:flex-start;margin-bottom:0.65rem;}
    .cep-row .cs-input{margin-bottom:0;flex:1;}
    .cep-btn{background:var(--bg3);border:1.5px solid rgba(56,56,53,0.12);border-radius:14px;padding:0.65rem 0.85rem;font-size:0.75rem;font-weight:800;color:var(--pr);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;height:46px;}
    .cep-hint{font-size:0.7rem;color:var(--txt3);margin-bottom:0.65rem;}
    .cep-hint.ok{color:var(--grn);}
    .cep-hint.err{color:var(--red);}
    .field-msg{font-size:0.7rem;color:var(--red);margin-top:-0.4rem;margin-bottom:0.5rem;display:none;}
    .field-msg.show{display:block;}
    .cs-send{width:100%;background:var(--pr);color:#fff;border:none;border-radius:16px;padding:1rem;font-size:0.95rem;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:0.75rem;box-shadow:0 4px 16px rgba(188,48,0,0.3);transition:transform 0.15s;}
    .cs-send:disabled{background:#FCA5A5;box-shadow:none;cursor:not-allowed;}
    .cs-send:active{transform:scale(0.98);}
    .cs-empty{text-align:center;padding:3rem 1rem;color:var(--txt3);}
    .cs-empty-icon{font-size:3rem;margin-bottom:0.75rem;}
    .cs-success{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;text-align:center;}
    .cs-success-icon{font-size:4rem;margin-bottom:1rem;}
    .cs-success-title{font-size:1.2rem;font-weight:900;color:var(--txt);margin-bottom:0.5rem;}
    .cs-success-sub{font-size:0.82rem;color:var(--txt2);line-height:1.7;}
    .cs-novo-btn{margin-top:1.75rem;background:var(--pr);color:#fff;border:none;border-radius:99px;padding:0.75rem 2rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;cursor:pointer;font-size:0.88rem;box-shadow:0 4px 16px rgba(188,48,0,0.3);}
  </style>
</head>
<body>

  <div class="loading" id="loading">
    <div class="loading-logo">🍕 DeliveryApp</div>
    <div class="loading-sub">Carregando cardápio...</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header class="header">
      <span class="header-logo" id="headerLogo">DeliveryApp</span>
      <button class="header-btn">
        <span class="mi" style="font-size:20px;color:var(--txt2);">location_on</span>
      </button>
    </header>

    <div class="hero">
      <div class="hero-img-wrap">
        <div id="heroBanner" class="hero-img-placeholder">🍕</div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="hero-name" id="storeName">Carregando...</div>
          <div class="hero-desc" id="storeDesc"></div>
          <div class="hero-badges" id="storeMeta"></div>
        </div>
      </div>
    </div>

    <div class="cats-wrap">
      <div class="cats" id="catsBar"></div>
    </div>

    <div class="menu-body" id="menuBody"></div>
  </div>

  <!-- TOAST -->
  <div class="toast-add" id="toastAdd">
    <span class="mi" style="font-size:16px;color:var(--grn);">check_circle</span>
    Item adicionado!
  </div>

  <!-- ITEM MODAL -->
  <div class="overlay" id="itemOverlay">
    <div class="modal-box">
      <div class="im-img-wrap">
        <div id="imImgWrap"></div>
        <button class="im-close" onclick="fecharItem()">
          <span class="mi" style="font-size:18px;color:var(--txt2);">close</span>
        </button>
      </div>
      <div class="im-body">
        <div class="im-name" id="imName"></div>
        <div class="im-desc" id="imDesc"></div>
        <div class="im-row">
          <span class="im-price" id="imPrice"></span>
          <!-- BUG FIX: botão − adicionado -->
          <div class="qrow">
            <button class="qbtn minus" onclick="chQty(-1)">
              <span class="mi" style="font-size:18px;">remove</span>
            </button>
            <span class="qnum" id="qtyNum">1</span>
            <button class="qbtn" onclick="chQty(1)">
              <span class="mi" style="font-size:18px;">add</span>
            </button>
          </div>
        </div>
        <button class="im-add" id="imAddBtn" onclick="addCarrinho()">Adicionar ao pedido</button>
      </div>
    </div>
  </div>

  <!-- CART BAR — FIX: layout novo sem corte -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-inner">
      <div class="cb-left">
        <div class="cb-cnt" id="cbCnt">0 itens</div>
        <div class="cb-tot" id="cbTot">R$0,00</div>
      </div>
      <button class="cb-btn" onclick="abrirCarrinho()">
        Ver carrinho
        <span class="mi" style="font-size:18px;color:var(--pr);">shopping_basket</span>
      </button>
    </div>
  </div>

  <!-- TELA CARRINHO -->
  <div class="cart-screen" id="cartScreen">
    <div class="cs-header">
      <button class="cs-back" onclick="fecharCarrinho()">
        <span class="mi" style="font-size:20px;color:var(--txt2);">arrow_back</span>
      </button>
      <span class="cs-title">Meu pedido</span>
    </div>
    <div class="cs-body" id="csBody"></div>
    <div class="cs-total" id="csTotalRow" style="display:none;">
      <span class="cs-total-lbl">Total do pedido</span>
      <span class="cs-total-val" id="csTotalVal">R$0,00</span>
    </div>
    <div class="cs-form" id="csForm" style="display:none;">
      <div class="cs-section">Seus dados</div>
      <label class="cs-label">Nome completo *</label>
      <input class="cs-input" id="cliNome" placeholder="Ex: João Silva" autocomplete="name">
      <div class="field-msg" id="msgNome"></div>
      <label class="cs-label">Celular / WhatsApp *</label>
      <input class="cs-input" id="cliTel" placeholder="(99) 99999-9999" type="tel" maxlength="15" autocomplete="tel" oninput="mascaraTel(this)" onblur="validarTel()">
      <div class="field-msg" id="msgTel"></div>
      <div class="cs-section">Endereço de entrega</div>
      <label class="cs-label">CEP *</label>
      <div class="cep-row">
        <input class="cs-input" id="cliCep" placeholder="00000-000" type="tel" maxlength="9" autocomplete="postal-code" oninput="mascaraCep(this)" onblur="validarCep()">
        <button class="cep-btn" onclick="buscarCep()">🔍 Buscar</button>
      </div>
      <div class="cep-hint" id="cepHint">Digite o CEP para preencher automaticamente</div>
      <label class="cs-label">Rua / Logradouro *</label>
      <input class="cs-input" id="cliRua" placeholder="Nome da rua" autocomplete="street-address">
      <div class="cs-row">
        <div>
          <label class="cs-label">Número *</label>
          <input class="cs-input" id="cliNum" placeholder="123" type="tel" style="margin-bottom:0;">
        </div>
        <div>
          <label class="cs-label">Complemento</label>
          <input class="cs-input" id="cliComp" placeholder="Apto, casa..." style="margin-bottom:0;">
        </div>
      </div>
      <div style="height:0.65rem;"></div>
      <label class="cs-label">Bairro *</label>
      <input class="cs-input" id="cliBairro" placeholder="Nome do bairro">
      <label class="cs-label">Cidade / Estado</label>
      <input class="cs-input" id="cliCidade" placeholder="Preenchido pelo CEP" disabled>
      <div class="cs-section">Observações</div>
      <textarea class="cs-textarea" id="cliObs" placeholder="Ex: sem cebola, troco para R$50, portão azul..."></textarea>
      <button class="cs-send" id="btnEnviar" onclick="enviarPedido()">Confirmar pedido</button>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js'
    import { getLoja, getCategorias, getProdutos } from './js/cardapio.js'
    import { criarPedido } from './js/pedidos.js'

    const params=new URLSearchParams(window.location.search)
    const lojaId=params.get('loja')
    let loja=null,produtos=[],categorias=[],cart=[],itemAtual=null,qty=1,catAtual='todos'
    const fmt=v=>'R$'+Number(v).toFixed(2).replace('.',',')

    function showToast(nome){
      const t=document.getElementById('toastAdd')
      t.innerHTML=`<span class="mi" style="font-size:16px;color:var(--grn);">check_circle</span> ${nome} adicionado!`
      t.classList.add('show')
      setTimeout(()=>t.classList.remove('show'),2200)
    }

    // MÁSCARAS
    window.mascaraTel=function(input){
      let v=input.value.replace(/\D/g,'')
      if(v.length>11)v=v.slice(0,11)
      if(v.length<=2)v='('+v
      else if(v.length<=7)v='('+v.slice(0,2)+') '+v.slice(2)
      else v='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7)
      input.value=v
    }
    window.mascaraCep=function(input){
      let v=input.value.replace(/\D/g,'')
      if(v.length>8)v=v.slice(0,8)
      if(v.length>5)v=v.slice(0,5)+'-'+v.slice(5)
      input.value=v
    }
    window.validarTel=function(){
      const v=document.getElementById('cliTel').value.replace(/\D/g,'')
      const msg=document.getElementById('msgTel')
      const inp=document.getElementById('cliTel')
      if(v.length===11){inp.classList.add('valido');inp.classList.remove('invalido');msg.className='field-msg';}
      else if(v.length>0){inp.classList.add('invalido');inp.classList.remove('valido');msg.textContent='Celular deve ter 11 dígitos — Ex: (99) 99999-9999';msg.className='field-msg show';}
      else{inp.classList.remove('valido','invalido');msg.className='field-msg';}
    }
    window.validarCep=async function(){
      const v=document.getElementById('cliCep').value.replace(/\D/g,'')
      if(v.length===8)await buscarCep()
      else if(v.length>0){const h=document.getElementById('cepHint');h.textContent='CEP deve ter 8 dígitos';h.className='cep-hint err';}
    }
    window.buscarCep=async function(){
      const v=document.getElementById('cliCep').value.replace(/\D/g,'')
      const h=document.getElementById('cepHint')
      if(v.length!==8){if(v.length>0){h.textContent='CEP incompleto';h.className='cep-hint err';}return}
      h.textContent='🔍 Buscando...';h.className='cep-hint'
      try{
        const r=await fetch(`https://viacep.com.br/ws/${v}/json/`)
        const d=await r.json()
        if(d.erro){h.textContent='❌ CEP não encontrado';h.className='cep-hint err';}
        else{
          document.getElementById('cliRua').value=d.logradouro||''
          document.getElementById('cliBairro').value=d.bairro||''
          document.getElementById('cliCidade').value=`${d.localidade} — ${d.uf}`
          h.textContent=`✅ ${d.localidade} — ${d.uf}`;h.className='cep-hint ok'
          document.getElementById('cliNum').focus()
        }
      }catch(e){h.textContent='Erro ao buscar. Preencha manualmente.';h.className='cep-hint err';}
    }

    async function init(){
      if(!lojaId){
        document.getElementById('loading').innerHTML='<div class="inativa"><div class="inativa-icon">🔗</div><div class="inativa-txt">Link inválido</div><div class="inativa-sub">Solicite o link correto ao estabelecimento.</div></div>'
        return
      }
      try{
        loja=await getLoja(lojaId)
        categorias=await getCategorias(lojaId)
        // BUG FIX: busca todos os produtos (não filtra disponivel aqui, filtra no render)
        produtos=await getProdutosPublicos(lojaId)
        if(!loja||!loja.ativa){
          document.getElementById('loading').innerHTML='<div class="inativa"><div class="inativa-icon">🔒</div><div class="inativa-txt">Loja indisponível</div><div class="inativa-sub">Este estabelecimento está temporariamente fora do ar.</div></div>'
          return
        }
        renderHero();renderCats();renderMenu()
        document.getElementById('loading').style.display='none'
        document.getElementById('app').style.display='block'
        document.title=loja.nome+' — Cardápio'
        document.getElementById('headerLogo').textContent='🍕 '+loja.nome
      }catch(e){
        console.error(e)
        document.getElementById('loading').innerHTML='<div class="inativa"><div class="inativa-icon">⚠️</div><div class="inativa-txt">Erro ao carregar</div><div class="inativa-sub">Tente recarregar a página.</div></div>'
      }
    }

    // BUG FIX: função separada para buscar produtos públicos (só disponíveis)
    async function getProdutosPublicos(lojaId){
      const {data}=await supabase
        .from('produtos')
        .select('*,categorias(nome)')
        .eq('loja_id',lojaId)
        .eq('disponivel',true)
        .order('ordem')
      return data||[]
    }

    function renderHero(){
      document.getElementById('storeName').textContent=loja.nome
      document.getElementById('storeDesc').textContent=loja.descricao||''
      if(loja.banner_url){
        const b=document.getElementById('heroBanner')
        b.outerHTML=`<img class="hero-img" src="${loja.banner_url}" alt="${loja.nome}">`
      }
      document.getElementById('storeMeta').innerHTML=`
        <span class="hero-badge badge-open"><span class="pulse"></span>${loja.aberta?'ABERTO':'FECHADO'}</span>
        ${loja.tempo_entrega?`<span class="hero-badge badge-glass"><span class="mi" style="font-size:13px;">schedule</span>${loja.tempo_entrega}</span>`:''}
        ${loja.cidade?`<span class="hero-badge badge-glass"><span class="mi" style="font-size:13px;">location_on</span>${loja.cidade}</span>`:''}`
    }

    function renderCats(){
      let h=`<button class="cat-btn active" onclick="filtrar('todos',this)">Todos</button>`
      categorias.forEach(c=>{h+=`<button class="cat-btn" onclick="filtrar('${c.id}',this)">${c.nome}</button>`})
      document.getElementById('catsBar').innerHTML=h
    }

    function renderMenu(){
      const cats=catAtual==='todos'?categorias:categorias.filter(c=>c.id===catAtual)
      let h=''
      cats.forEach((cat,ci)=>{
        const itens=produtos.filter(p=>p.categoria_id===cat.id)
        if(!itens.length)return
        h+=`<div class="sec-hd">${cat.nome}</div>`
        itens.forEach((p,idx)=>{
          const rot=(ci+idx)%2===0?'rotate(6deg)':'rotate(-6deg)'
          h+=`<div class="item-card" onclick="abrirItem('${p.id}')" style="padding-top:1.5rem;margin-top:${idx===0?'1.5rem':'1rem'};">
            ${p.foto_url
              ?`<img class="item-float-img" src="${p.foto_url}" alt="${p.nome}" style="transform:${rot};">`
              :`<div class="item-float-ph" style="transform:${rot};">🍽️</div>`}
            <div class="item-body">
              <div class="iname">${p.nome}</div>
              <div class="idesc">${p.descricao||''}</div>
              <div class="ifoot">
                <span class="iprice">${fmt(p.preco)}</span>
              </div>
            </div>
            <button class="iadd-float" onclick="event.stopPropagation();quickAdd('${p.id}')">
              <span class="mi" style="font-size:20px;">add</span>
            </button>
          </div>`
        })
      })
      if(!h)h='<div style="text-align:center;padding:3rem;color:var(--txt3);font-size:0.85rem;">Nenhum item disponível</div>'
      document.getElementById('menuBody').innerHTML=h
    }

    window.filtrar=function(catId,el){
      catAtual=catId
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'))
      el.classList.add('active');renderMenu()
    }

    window.abrirItem=function(id){
      itemAtual=produtos.find(p=>p.id===id);qty=1
      document.getElementById('imName').textContent=itemAtual.nome
      document.getElementById('imDesc').textContent=itemAtual.descricao||''
      document.getElementById('imPrice').textContent=fmt(itemAtual.preco)
      document.getElementById('qtyNum').textContent=1
      document.getElementById('imAddBtn').textContent='Adicionar ao pedido'
      document.getElementById('imImgWrap').innerHTML=itemAtual.foto_url
        ?`<img class="im-img" src="${itemAtual.foto_url}" alt="${itemAtual.nome}">`
        :`<div class="im-img-placeholder">🍽️</div>`
      document.getElementById('itemOverlay').classList.add('open')
    }

    window.fecharItem=()=>document.getElementById('itemOverlay').classList.remove('open')

    // BUG FIX: chQty aceita negativo corretamente
    window.chQty=function(d){
      qty=Math.max(1,qty+d)
      document.getElementById('qtyNum').textContent=qty
      // Atualiza texto do botão com total
      const total=fmt(itemAtual.preco*qty)
      document.getElementById('imAddBtn').textContent=
        qty>1?`Adicionar ${qty}x — ${total}`:'Adicionar ao pedido'
    }

    window.quickAdd=function(id){
      const p=produtos.find(x=>x.id===id)
      const ex=cart.find(c=>c.id===id)
      if(ex)ex.qty++;else cart.push({...p,qty:1})
      atualizarCartBar();showToast(p.nome)
    }

    window.addCarrinho=function(){
      if(!itemAtual)return
      const ex=cart.find(c=>c.id===itemAtual.id)
      if(ex)ex.qty+=qty;else cart.push({...itemAtual,qty})
      fecharItem();atualizarCartBar();showToast(itemAtual.nome)
    }

    function atualizarCartBar(){
      const total=cart.reduce((s,i)=>s+i.preco*i.qty,0)
      const count=cart.reduce((s,i)=>s+i.qty,0)
      const bar=document.getElementById('cartBar')
      if(!count){bar.classList.remove('show');return}
      bar.classList.add('show')
      document.getElementById('cbCnt').textContent=count+(count===1?' item':' itens')
      document.getElementById('cbTot').textContent=fmt(total)
    }

    function renderCarrinho(){
      const total=cart.reduce((s,i)=>s+i.preco*i.qty,0)
      const totalRow=document.getElementById('csTotalRow')
      const form=document.getElementById('csForm')
      if(!cart.length){
        document.getElementById('csBody').innerHTML=`<div class="cs-empty"><div class="cs-empty-icon">🛒</div><div style="font-size:0.88rem;font-weight:700;color:var(--txt2);">Seu carrinho está vazio</div></div>`
        totalRow.style.display='none';form.style.display='none';return
      }
      totalRow.style.display='flex';form.style.display='block'
      document.getElementById('csTotalVal').textContent=fmt(total)
      document.getElementById('csBody').innerHTML=cart.map(i=>`
        <div class="cs-item">
          ${i.foto_url?`<img class="csi-img" src="${i.foto_url}" alt="${i.nome}">`:`<div class="csi-img-ph">🍽️</div>`}
          <div class="csi-info">
            <div class="csi-name">${i.nome}</div>
            <div class="csi-price">${fmt(i.preco)} un.</div>
          </div>
          <div class="csi-controls">
            <button class="csi-btn remove" onclick="alterarQty('${i.id}',-1)">−</button>
            <span class="csi-qty">${i.qty}</span>
            <button class="csi-btn" onclick="alterarQty('${i.id}',1)">+</button>
          </div>
          <span class="csi-subtotal">${fmt(i.preco*i.qty)}</span>
        </div>`).join('')
    }

    window.alterarQty=function(id,d){
      const idx=cart.findIndex(c=>c.id===id);if(idx===-1)return
      cart[idx].qty+=d;if(cart[idx].qty<=0)cart.splice(idx,1)
      atualizarCartBar();renderCarrinho()
    }

    window.abrirCarrinho=function(){renderCarrinho();document.getElementById('cartScreen').classList.add('open')}
    window.fecharCarrinho=()=>document.getElementById('cartScreen').classList.remove('open')

    window.enviarPedido=async function(){
      const nome=document.getElementById('cliNome').value.trim()
      const tel=document.getElementById('cliTel').value.replace(/\D/g,'')
      const rua=document.getElementById('cliRua').value.trim()
      const num=document.getElementById('cliNum').value.trim()
      const bairro=document.getElementById('cliBairro').value.trim()
      const comp=document.getElementById('cliComp').value.trim()
      const cidade=document.getElementById('cliCidade').value.trim()
      const cep=document.getElementById('cliCep').value.trim()
      const obs=document.getElementById('cliObs').value.trim()
      const erros=[]
      if(nome.length<3)erros.push('Nome completo é obrigatório')
      if(tel.length!==11)erros.push('Celular deve ter 11 dígitos — Ex: (99) 99999-9999')
      if(!rua)erros.push('Rua é obrigatória')
      if(!num)erros.push('Número é obrigatório')
      if(!bairro)erros.push('Bairro é obrigatório')
      if(erros.length){alert('Por favor corrija:\n\n• '+erros.join('\n• '));return}
      const enderecoCompleto=`${rua}, ${num}${comp?' — '+comp:''}, ${bairro}${cidade?' — '+cidade:''} (CEP: ${cep})`
      const btn=document.getElementById('btnEnviar')
      btn.disabled=true;btn.textContent='Enviando...'
      try{
        // BUG FIX: garante que nome do produto existe no objeto
        const itens=cart.map(i=>({
          produto_id:i.id,
          nome:i.nome||'Produto',
          preco:i.preco,
          quantidade:i.qty,
          subtotal:i.preco*i.qty
        }))
        await criarPedido(lojaId,{nome,telefone:document.getElementById('cliTel').value,endereco:enderecoCompleto,obs},itens)
        const total=cart.reduce((s,i)=>s+i.preco*i.qty,0)
        let msg=`*Novo Pedido — ${loja.nome}*\n\n*Cliente:* ${nome}\n*Celular:* ${document.getElementById('cliTel').value}\n\n*Endereço:*\n${rua}, ${num}${comp?' — '+comp:''}\n${bairro}${cidade?' — '+cidade:''}\nCEP: ${cep}\n\n*Itens:*\n`
        cart.forEach(i=>{msg+=`• ${i.qty}x ${i.nome} — ${fmt(i.preco*i.qty)}\n`})
        msg+=`\n*Total: ${fmt(total)}*`
        if(obs)msg+=`\n\n*Obs:* ${obs}`
        if(loja.whatsapp){window.open(`https://wa.me/55${loja.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank')}
        document.getElementById('cartScreen').innerHTML=`
          <div class="cs-success">
            <div class="cs-success-icon">🎉</div>
            <div class="cs-success-title">Pedido confirmado!</div>
            <div class="cs-success-sub">Seu pedido foi registrado e enviado pelo WhatsApp.<br>Aguarde a confirmação do estabelecimento.<br><br><strong>Entrega em:</strong><br>${rua}, ${num}${comp?' — '+comp:''}<br>${bairro}${cidade?' — '+cidade:''}<br>CEP: ${cep}</div>
            <button class="cs-novo-btn" onclick="location.reload()">Fazer novo pedido</button>
          </div>`
        cart=[];atualizarCartBar()
      }catch(e){
        console.error(e)
        alert('Erro ao enviar pedido. Tente novamente.')
        btn.disabled=false;btn.textContent='Confirmar pedido'
      }
    }

    init()
  </script>
</body>
</html>
